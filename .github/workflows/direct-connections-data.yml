name: Update direct connections data

on:
  schedule:
    # GitHub Actions schedules run in UTC: 07:00 UTC is 08:00 CET.
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build direct connections data
        run: python scripts/build-direct-connections.py --force-download

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update direct connections data"
          file_pattern: public/direct-connections.db
